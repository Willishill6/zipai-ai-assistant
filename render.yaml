services:
  - type: web
    name: zipai-ai-assistant
    env: node
    buildCommand: pnpm install && pnpm build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zipai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: BUILT_IN_FORGE_API_KEY
        sync: false

databases:
  - name: zipai-db
    databaseName: zipai
    user: zipai_user